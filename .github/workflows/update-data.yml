name: Refresh data snapshot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch ESPN snapshot
        run: node scripts/update-snapshot.mjs
      - name: Commit if changed
        run: |
          if git diff --quiet data/snapshot.json; then
            echo "No changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/snapshot.json
            git commit -m "data: refresh snapshot ($(date -u +%Y-%m-%d\ %H:%M\ UTC))"
            git push
          fi
